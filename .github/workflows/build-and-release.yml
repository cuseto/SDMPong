# This workflow builds the app the same way as the main CI workflow,
# then packages it and publishes it as a GitHub Release whenever
# new commits land on the "release" branch.
#
# The version number is read from app/build.gradle's `version` field,
# so bump that value before merging to release when you want a new
# version published.
#
# softprops/action-gh-release is a third-party action, not certified
# by GitHub, governed by its own terms of service:
# https://github.com/softprops/action-gh-release

name: Build and Release

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required so the workflow can publish a Release

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    - name: Install Xvfb
      run: sudo apt-get install -y xvfb

    - name: Build and test
      run: xvfb-run --auto-servernum ./gradlew build

    - name: Package distributable zip
      run: ./gradlew distZip

    - name: Read version from build.gradle
      id: get_version
      run: echo "version=$(./gradlew -q printVersion)" >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        files: app/build/distributions/*.zip